# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "area:dependencies"

  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: weekly
    labels:
      - "area:dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "area:dependencies"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "area:dependencies"
