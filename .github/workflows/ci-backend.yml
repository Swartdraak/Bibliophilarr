name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - staging

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Bibliophilarr.sln -p:Platform=Posix

      - name: Build
        run: dotnet build Bibliophilarr.sln --configuration Release --no-restore -p:Platform=Posix

      - name: Test
        run: >-
          dotnet test NzbDrone.Common.Test/Bibliophilarr.Common.Test.csproj
          --configuration Release --no-build --verbosity minimal -p:Platform=Posix

  metadata-provider-fixtures:
    name: Metadata Provider Fixtures
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Bibliophilarr.sln -p:Platform=Posix

      - name: Run validated metadata core fixtures
        run: >-
          dotnet test NzbDrone.Core.Test/Bibliophilarr.Core.Test.csproj
          --configuration Release --no-restore --verbosity minimal -p:Platform=Posix
          --filter
          'FullyQualifiedName~MetadataProviderOrchestratorFixture|FullyQualifiedName~ImportListSyncServiceFixture|FullyQualifiedName~OpenLibraryClientResilienceFixture|FullyQualifiedName~InventaireClientResilienceFixture|FullyQualifiedName~OpenLibraryIdBackfillServiceFixture'

      - name: Run metadata API fixtures
        run: >-
          dotnet test NzbDrone.Api.Test/Bibliophilarr.Api.Test.csproj
          --configuration Release --no-restore --verbosity minimal -p:Platform=Posix
          --filter
          'FullyQualifiedName~MetadataProvidersControllerFixture|FullyQualifiedName~MetadataProviderConfigResourceMapperFixture'

  metadata-diagnostics-integration:
    name: Metadata Diagnostics Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      - name: Build backend runtime for integration harness
        run: |
          cd ..
          ./build.sh --backend -r linux-x64 -f net8.0

      - name: Run metadata diagnostics integration fixture
        run: >-
          dotnet test NzbDrone.Integration.Test/Bibliophilarr.Integration.Test.csproj
          --configuration Debug --verbosity minimal -p:Platform=Posix
          --filter
          'FullyQualifiedName~MetadataProviderDiagnosticsFixture'
