name: Bibliophilarr Backend CI

on:
  workflow_dispatch:
    inputs:
      run_full_suite:
        description: 'Run extended backend test suite'
        required: false
        default: 'false'
  pull_request:
  push:
    branches:
      - main
      - develop
      - staging
      - release
      - hotfix

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Legacy Brand Audit
        run: |
          # Strict zero enforcement is active only on dedicated rename lanes.
          if [[ "${GITHUB_REF_NAME}" == rename/* ]]; then
            echo "Running strict legacy brand audit for rename lane"
            ../scripts/legacy-brand-audit.sh --output ../_artifacts/legacy-brand-audit --enforce-zero
          else
            echo "Running visibility-only legacy brand audit"
            ../scripts/legacy-brand-audit.sh --output ../_artifacts/legacy-brand-audit
          fi

      - name: Upload Legacy Brand Audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-brand-audit
          path: _artifacts/legacy-brand-audit

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Bibliophilarr.sln -p:Platform=Posix

      - name: Build
        run: >-
          dotnet build Bibliophilarr.sln --configuration Release --no-restore
          -p:Platform=Posix

      - name: Test
        run: |
          dotnet test NzbDrone.Common.Test/Bibliophilarr.Common.Test.csproj \
            --configuration Release \
            --no-build \
            -p:Platform=Posix \
            --verbosity minimal

  full-test-suite:
    runs-on: ubuntu-latest
    needs: build-test
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.run_full_suite == 'true' ||
      github.ref_name == 'main' ||
      github.ref_name == 'staging' ||
      contains(github.event.pull_request.labels.*.name, 'full-backend-ci')
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Bibliophilarr.sln -p:Platform=Posix

      - name: Build
        run: >-
          dotnet build Bibliophilarr.sln --configuration Release --no-restore
          -p:Platform=Posix

      - name: Extended backend tests
        run: |
          dotnet test NzbDrone.Host.Test/Bibliophilarr.Host.Test.csproj \
            --configuration Release \
            --no-build \
            -p:Platform=Posix \
            --verbosity minimal

          dotnet test NzbDrone.Api.Test/Bibliophilarr.Api.Test.csproj \
            --configuration Release \
            --no-build \
            -p:Platform=Posix \
            --verbosity minimal
