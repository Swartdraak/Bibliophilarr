---
name: Phase 6 Packaging Validation

"on":
  schedule:
    - cron: '0 4 * * 2'
  push:
    branches:
      - develop
      - staging
    paths:
      - '.github/workflows/phase6-packaging-validation.yml'
      - 'scripts/packaging_error_taxonomy.py'
      - 'scripts/test_packaging_error_taxonomy.py'
      - 'scripts/test_npm_launcher_cache_seed.sh'
      - 'tests/fixtures/packaging-taxonomy/**'
      - 'tests/profiles/packaging-high-verbosity.config.xml'
      - 'npm/bibliophilarr-launcher/**'
  workflow_dispatch:
    inputs:
      npm_test_tag:
        description: >-
          Pinned launcher tag used for cache-seeded invocation validation.
        required: false
        default: v0.0.0-phase6-smoke
      max_unknown_share:
        description: >-
          Maximum allowed unknown taxonomy share (0-1) before failing.
        required: false
        default: "0.75"

permissions:
  contents: read

jobs:
  packaging-matrix:
    runs-on: ubuntu-latest
    env:
      NPM_TEST_TAG: >-
        ${{ github.event.inputs.npm_test_tag || 'v0.0.0-phase6-smoke' }}
      MAX_UNKNOWN_SHARE: >-
        ${{ github.event.inputs.max_unknown_share || '0.75' }}
    strategy:
      fail-fast: false
      matrix:
        install_type: [binary, docker, npm]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        if: matrix.install_type == 'binary'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      - name: Setup Node
        if: matrix.install_type == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify taxonomy fixtures
        run: |
          python3 scripts/test_packaging_error_taxonomy.py

      - name: Prepare artifact workspace
        run: |
          mkdir -p _artifacts/phase6-packaging/${{ matrix.install_type }}

      - name: Binary install path validation
        if: matrix.install_type == 'binary'
        run: |
          set -e
          dotnet msbuild -restore src/Bibliophilarr.sln \
            -p:Platform=Posix \
            -p:Configuration=Release \
            -consoleloggerparameters:NoSummary
          mkdir -p /tmp/bibliophilarr-packaging-binary
          cp tests/profiles/packaging-high-verbosity.config.xml \
            /tmp/bibliophilarr-packaging-binary/config.xml
          sed -i 's#<Port>8787</Port>#<Port>8794</Port>#' \
            /tmp/bibliophilarr-packaging-binary/config.xml
          python3 - <<'PY'
from pathlib import Path
path = Path('/tmp/bibliophilarr-packaging-binary/config.xml')
text = path.read_text()
entry = '  <MetadataSource>https://api.bookinfo.invalid/v1</MetadataSource>\n'
if '<MetadataSource>' in text:
    import re
    text = re.sub(r'\s*<MetadataSource>.*?</MetadataSource>\s*', '\n' + entry, text, count=1)
else:
    text = text.replace('  <Branch>develop</Branch>\n', entry + '  <Branch>develop</Branch>\n')
path.write_text(text)
PY
          api_key_pattern='s#<ApiKey>packaging-ci-key</ApiKey>#'
          api_key_pattern+='<ApiKey>binary-ci-key</ApiKey>#'
          sed -i "${api_key_pattern}" \
            /tmp/bibliophilarr-packaging-binary/config.xml
          mkdir -p /tmp/bibliophilarr-packaging-binary/root
          timeout 240s ./_output/net8.0/Bibliophilarr \
            /data=/tmp/bibliophilarr-packaging-binary \
            /nobrowser /nosingleinstancecheck \
            > _artifacts/phase6-packaging/binary/service.log 2>&1 &
          app_pid=$!
          echo "$app_pid" > _artifacts/phase6-packaging/binary/service.pid
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://127.0.0.1:8794/ping" || true)
            if [ "$code" = "200" ]; then
              break
            fi
            sleep 2
          done
          curl -f -sS -H "X-Api-Key: binary-ci-key" \
            -H "Content-Type: application/json" \
            -d '{"path":"/tmp/bibliophilarr-packaging-binary/root"}' \
            "http://127.0.0.1:8794/api/v1/rootfolder" \
            > _artifacts/phase6-packaging/binary/rootfolder.json
          curl -f -sS -H "X-Api-Key: binary-ci-key" \
            "http://127.0.0.1:8794/api/v1/author/lookup?term=Frank%20Herbert" \
            > _artifacts/phase6-packaging/binary/author-lookup.json
          jq -e '.[] | select(.foreignAuthorId == "openlibrary:author:OL23919A")' \
            _artifacts/phase6-packaging/binary/author-lookup.json \
            > _artifacts/phase6-packaging/binary/author-seed.json
          jq '.qualityProfileId = 1 |
              .metadataProfileId = 1 |
              .rootFolderPath = "/tmp/bibliophilarr-packaging-binary/root" |
              .path = "/tmp/bibliophilarr-packaging-binary/root/Frank Herbert" |
              .monitored = true' \
            _artifacts/phase6-packaging/binary/author-seed.json \
            > _artifacts/phase6-packaging/binary/author-create.json
          mkdir -p "/tmp/bibliophilarr-packaging-binary/root/Frank Herbert"
          curl -f -sS -H "X-Api-Key: binary-ci-key" \
            -H "Content-Type: application/json" \
            -d @"_artifacts/phase6-packaging/binary/author-create.json" \
            "http://127.0.0.1:8794/api/v1/author" \
            > _artifacts/phase6-packaging/binary/author-created.json
          author_id=$(jq -r '.id' _artifacts/phase6-packaging/binary/author-created.json)
          test -n "$author_id" && test "$author_id" != "null"
          for i in $(seq 1 120); do
            command_count=$(curl -f -sS -H "X-Api-Key: binary-ci-key" \
              "http://127.0.0.1:8794/api/v1/command" | \
              jq '[.[] | select(.status == "queued" or .status == "started")] | length')
            if [ "$command_count" = "0" ]; then
              break
            fi
            sleep 2
          done
          jq -n --argjson authorId "$author_id" '{name:"RefreshAuthor", authorId:$authorId}' \
            > _artifacts/phase6-packaging/binary/refresh-author-request.json
          curl -f -sS -H "X-Api-Key: binary-ci-key" \
            -H "Content-Type: application/json" \
            -d @"_artifacts/phase6-packaging/binary/refresh-author-request.json" \
            "http://127.0.0.1:8794/api/v1/command" \
            > _artifacts/phase6-packaging/binary/refresh-author-command.json
          refresh_command_id=$(jq -r '.id' _artifacts/phase6-packaging/binary/refresh-author-command.json)
          test -n "$refresh_command_id" && test "$refresh_command_id" != "null"
          refresh_completed=0
          for i in $(seq 1 300); do
            curl -f -sS -H "X-Api-Key: binary-ci-key" \
              "http://127.0.0.1:8794/api/v1/command/${refresh_command_id}" \
              > _artifacts/phase6-packaging/binary/refresh-author-status.json
            status=$(jq -r '.status' _artifacts/phase6-packaging/binary/refresh-author-status.json)
            result=$(jq -r '.result // empty' _artifacts/phase6-packaging/binary/refresh-author-status.json)
            if [ "$status" = "completed" ]; then
              if [ -n "$result" ] && [ "$result" != "successful" ]; then
                echo "RefreshAuthor command completed unsuccessfully: $result" >&2
                exit 1
              fi
              refresh_completed=1
              break
            fi
            if [ "$status" = "failed" ]; then
              echo "RefreshAuthor command failed" >&2
              exit 1
            fi
            sleep 2
          done
          if [ "$refresh_completed" != "1" ]; then
            echo "RefreshAuthor command did not complete in time" >&2
            exit 1
          fi
          curl -f -sS -H "X-Api-Key: binary-ci-key" \
            "http://127.0.0.1:8794/api/v1/metadata/providers/health" \
            > _artifacts/phase6-packaging/binary/providers-health.json
          curl -f -sS -H "X-Api-Key: binary-ci-key" \
            "http://127.0.0.1:8794/api/v1/metadata/conflicts/telemetry" \
            > _artifacts/phase6-packaging/binary/conflict-telemetry.json
          curl -f -sS -H "X-Api-Key: binary-ci-key" \
            "http://127.0.0.1:8794/api/v1/diagnostics/search/telemetry" \
            > _artifacts/phase6-packaging/binary/search-telemetry.json
          curl -f -sS -H "X-Api-Key: binary-ci-key" \
            "http://127.0.0.1:8794/api/v1/metadata/providers/telemetry" \
            > _artifacts/phase6-packaging/binary/providers-telemetry.json
          curl -f -sS -H "X-Api-Key: binary-ci-key" \
            "http://127.0.0.1:8794/api/v1/metadata/providers/telemetry/operations" \
            > _artifacts/phase6-packaging/binary/providers-operation-telemetry.json
          fallback_hits=$(jq '[.[] | select(.providerName == "OpenLibrary" and (.operationName == "get-book-info" or .operationName == "get-author-info") and .fallbackHits > 0)] | length' \
            _artifacts/phase6-packaging/binary/providers-operation-telemetry.json)
          if [ "$fallback_hits" = "0" ]; then
            echo "Expected OpenLibrary fallback hits after RefreshAuthor smoke" >&2
            exit 1
          fi
          : > _artifacts/phase6-packaging/binary/isbn-heavy-batch.log
          : > _artifacts/phase6-packaging/binary/isbn-heavy-batch-429.log
          for isbn in \
            9781433200236 9789992296004 9789994871797 9780440243830 \
            9780261103573 9780618346257 9781455546176 9780547773742; do
            for attempt in $(seq 1 10); do
              code=$(curl -sS -o /tmp/bibliophilarr-isbn-batch.json -w "%{http_code}" \
                -H "X-Api-Key: binary-ci-key" \
                "http://127.0.0.1:8794/api/v1/book/lookup?term=${isbn}" || true)
              printf '%s\t%s\t%s\n' "${isbn}" "${attempt}" "${code}" \
                >> _artifacts/phase6-packaging/binary/isbn-heavy-batch.log
              if grep -q '429' _artifacts/phase6-packaging/binary/service.log; then
                grep '429' _artifacts/phase6-packaging/binary/service.log \
                  > _artifacts/phase6-packaging/binary/isbn-heavy-batch-429.log || true
                break 2
              fi
            done
          done
          sha256sum ./_output/net8.0/Bibliophilarr \
            > _artifacts/phase6-packaging/binary/binary-sha256.txt
          ping_code=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://127.0.0.1:8794/ping" || true)
          {
            echo "# Install Readiness Snapshot"
            echo
            echo "- timestamp_utc: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- binary_path: _output/net8.0/Bibliophilarr"
            echo "- ping_status: ${ping_code}"
            echo "- config_path: /tmp/bibliophilarr-packaging-binary/config.xml"
            echo "- providers_health_artifact: providers-health.json"
            echo "- providers_telemetry_artifact: providers-telemetry.json"
            echo "- providers_operation_telemetry_artifact: providers-operation-telemetry.json"
            echo "- conflict_telemetry_artifact: conflict-telemetry.json"
            echo "- search_telemetry_artifact: search-telemetry.json"
            echo "- refresh_author_command_artifact: refresh-author-command.json"
            echo "- refresh_author_status_artifact: refresh-author-status.json"
            echo "- isbn_heavy_batch_artifact: isbn-heavy-batch.log"
            echo "- isbn_rate_limit_artifact: isbn-heavy-batch-429.log"
            echo "- checksum_artifact: binary-sha256.txt"
          } > _artifacts/phase6-packaging/binary/install-readiness-snapshot.md
          kill "$app_pid" || true

      - name: Docker install path validation
        if: matrix.install_type == 'docker'
        run: |
          set -e
          docker build -t bibliophilarr:phase6-test . \
            > _artifacts/phase6-packaging/docker/docker-build.log 2>&1
          docker run -d --name bibliophilarr-phase6 -p 18787:8787 \
            bibliophilarr:phase6-test \
            > _artifacts/phase6-packaging/docker/container-id.txt
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://127.0.0.1:18787/ping" || true)
            if [ "$code" = "200" ]; then
              break
            fi
            sleep 2
          done
          curl -f -sS "http://127.0.0.1:18787/ping" \
            > _artifacts/phase6-packaging/docker/ping.txt
          docker logs bibliophilarr-phase6 \
            > _artifacts/phase6-packaging/docker/container.log 2>&1 || true
          docker rm -f bibliophilarr-phase6 || true

      - name: npm install path validation
        if: matrix.install_type == 'npm'
        run: |
          set -e
          workspace_dir="${GITHUB_WORKSPACE}"
          cd npm/bibliophilarr-launcher
          npm pack > "${workspace_dir}/_artifacts/phase6-packaging/npm/npm-pack.log"
          pkg="$(ls -1 *.tgz | head -n 1)"
          cd /tmp
          rm -rf bibliophilarr-npm-install
          mkdir -p bibliophilarr-npm-install
          cd bibliophilarr-npm-install
          npm init -y > \
            "${workspace_dir}/_artifacts/phase6-packaging/npm/npm-init.log" 2>&1
          npm_log="${workspace_dir}/_artifacts/phase6-packaging/npm/npm-install.log"
          npm install \
            "${workspace_dir}/npm/bibliophilarr-launcher/${pkg}" \
            > "${npm_log}" 2>&1
          launcher_log="${workspace_dir}/_artifacts/phase6-packaging/npm/launcher-help.log"
          chmod +x "${workspace_dir}/scripts/test_npm_launcher_cache_seed.sh"
          "${workspace_dir}/scripts/test_npm_launcher_cache_seed.sh" \
            ./node_modules/.bin/bibliophilarr \
            "${NPM_TEST_TAG}" \
            "${launcher_log}"

      - name: Build error taxonomy summary
        if: always()
        run: |
          python3 scripts/packaging_error_taxonomy.py \
            --input-dir "_artifacts/phase6-packaging/${{ matrix.install_type }}" \
            --max-unknown-share "${MAX_UNKNOWN_SHARE}" \
            --json-out "_artifacts/phase6-packaging/${{ matrix.install_type }}/error-taxonomy.json" \
            --md-out "_artifacts/phase6-packaging/${{ matrix.install_type }}/error-taxonomy.md"

      - name: Upload packaging artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6-packaging-${{ matrix.install_type }}
          retention-days: 21
          path: _artifacts/phase6-packaging/${{ matrix.install_type }}
