name: Bibliophilarr npm Publish

# npm publish workflow — runs only from main branch (via release events or manual dispatch).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'npm package version to publish (x.y.z)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish
    defaults:
      run:
        working-directory: npm/bibliophilarr-launcher

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.22.2'
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
