name: Branch Policy Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1'

permissions:
  contents: read
  security-events: read

jobs:
  audit-branch-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Audit branch protection drift
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _artifacts/branch-policy-audit
          python3 scripts/audit_branch_protection.py \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --branches develop staging main \
            --expected-review-count 0 \
            --allow-integration-403 \
            --json-out _artifacts/branch-policy-audit/audit.json \
            --md-out _artifacts/branch-policy-audit/audit.md

      - name: Upload branch policy audit artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: branch-policy-audit
          path: _artifacts/branch-policy-audit
