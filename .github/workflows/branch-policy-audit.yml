name: Branch Policy Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1'

permissions:
  contents: read

jobs:
  audit-branch-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Audit branch protection drift
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _artifacts/branch-policy-audit
          python3 scripts/audit_branch_protection.py \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --branches develop staging main \
            --expected-review-count 0 \
            --json-out _artifacts/branch-policy-audit/audit.json \
            --md-out _artifacts/branch-policy-audit/audit.md

      - name: Upload branch policy audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branch-policy-audit
          path: _artifacts/branch-policy-audit
