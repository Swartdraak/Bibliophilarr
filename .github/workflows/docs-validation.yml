name: Docs Validation

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - staging

permissions:
  contents: read

jobs:
  markdown-link-check:
    name: Markdown lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            QUICKSTART.md
            ROADMAP.md
            MIGRATION_PLAN.md
            PROJECT_STATUS.md
            CONTRIBUTING.md
            SECURITY.md
            CHANGELOG.md
            docs/operations/METADATA_MIGRATION_DRY_RUN.md
            docs/operations/METADATA_PROVIDER_RUNBOOK.md
            docs/operations/RELEASE_AUTOMATION.md
