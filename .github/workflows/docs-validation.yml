name: Bibliophilarr Docs Validation

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - staging
      - release
      - hotfix

permissions:
  contents: read

jobs:
  markdown-link-check:
    name: Markdown lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            QUICKSTART.md
            CONTRIBUTING.md
            SECURITY.md
            docs/**/*.md
