name: Staging Smoke Metadata Telemetry

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-metadata-telemetry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      - name: Restore and build
        working-directory: src
        run: |
          dotnet restore Bibliophilarr.sln -p:Platform=Posix
          dotnet build Bibliophilarr.sln --configuration Release --no-restore -p:Platform=Posix

      - name: Prepare isolated appdata with high-verbosity profile
        run: |
          mkdir -p /tmp/bibliophilarr-smoke
          cp tests/profiles/packaging-high-verbosity.config.xml /tmp/bibliophilarr-smoke/config.xml
          sed -i 's#<Port>8787</Port>#<Port>8793</Port>#' /tmp/bibliophilarr-smoke/config.xml
          sed -i 's#<ApiKey>packaging-ci-key</ApiKey>#<ApiKey>smoke-ci-key</ApiKey>#' /tmp/bibliophilarr-smoke/config.xml

      - name: Start service
        run: |
          mkdir -p _artifacts/staging-smoke
          DOTNET_CLI_TELEMETRY_OPTOUT=1 timeout 180s ./_output/net8.0/Bibliophilarr /data=/tmp/bibliophilarr-smoke /nobrowser /nosingleinstancecheck > _artifacts/staging-smoke/service.log 2>&1 &
          echo $! > _artifacts/staging-smoke/service.pid

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8793/ping" || true)
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Service did not become ready"
          exit 1

      - name: Validate telemetry endpoints
        run: |
          curl -f -sS -H "X-Api-Key: smoke-ci-key" "http://127.0.0.1:8793/api/v1/metadata/providers/health" > _artifacts/staging-smoke/providers-health.json
          curl -f -sS -H "X-Api-Key: smoke-ci-key" "http://127.0.0.1:8793/api/v1/metadata/conflicts/telemetry" > _artifacts/staging-smoke/conflict-telemetry.json

      - name: Stop service
        if: always()
        run: |
          if [ -f _artifacts/staging-smoke/service.pid ]; then
            kill "$(cat _artifacts/staging-smoke/service.pid)" || true
          fi

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-metadata-telemetry
          path: _artifacts/staging-smoke
