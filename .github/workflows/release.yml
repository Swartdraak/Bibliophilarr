name: Bibliophilarr Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (example: v1.2.3)'
        required: true
      draft:
        description: 'Create release as draft'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release-entry-gate:
    name: Release Entry Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Enforce release-entry evidence gates
        run: |
          mkdir -p _artifacts/release-entry
          python3 scripts/release_entry_gate.py \
            --max-age-days 7 \
            --md-out _artifacts/release-entry/release-entry-gate.md \
            --json-out _artifacts/release-entry/release-entry-gate.json

      - name: Upload release-entry gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-entry-gate
          path: _artifacts/release-entry

  build-package:
    name: Build and Package (${{ matrix.rid }})
    needs: release-entry-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive_ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive_ext: tar.gz
          - os: windows-latest
            rid: win-x64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          global-json-file: global.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Yarn
        shell: bash
        run: |
          corepack enable
          corepack prepare yarn@1.22.19 --activate
          yarn --version

      - name: Build backend
        shell: bash
        run: ./build.sh --backend -r ${{ matrix.rid }} -f net8.0

      - name: Build frontend
        shell: bash
        run: ./build.sh --frontend

      - name: Build package
        shell: bash
        run: ./build.sh --packages -r ${{ matrix.rid }} -f net8.0

      - name: Resolve version metadata
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Archive package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          tar -C "_artifacts/${{ matrix.rid }}/net8.0" \
            -czf "release/bibliophilarr-${{ steps.ver.outputs.version }}-${{ matrix.rid }}.${{ matrix.archive_ext }}" \
            Bibliophilarr

      - name: Archive package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive \
            -Path "_artifacts/${{ matrix.rid }}/net8.0/Bibliophilarr/*" \
            -DestinationPath "release/bibliophilarr-${{ steps.ver.outputs.version }}-${{ matrix.rid }}.${{ matrix.archive_ext }}" \
            -Force

      - name: Build installer (windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ./build.sh --installer -r win-x64 -f net8.0
          cp distribution/windows/setup/output/*.exe release/ || true

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: release/*

  draft-release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    needs: build-package

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            release-assets/*
