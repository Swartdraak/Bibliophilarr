---
name: Weekly Replay Report

"on":
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  replay-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REPLAY_ROOT: tests/fixtures/replay-cohort
      REPLAY_SAMPLE_SIZE: "64"
      REPLAY_SAMPLE_SEED: "20260316"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare report directory
        id: prep
        run: |
          run_date="$(date +%Y-%m-%d)"
          report_dir="_artifacts/weekly-replay-${run_date}"
          echo "run_date=${run_date}" >> "$GITHUB_OUTPUT"
          echo "report_dir=${report_dir}" >> "$GITHUB_OUTPUT"
          mkdir -p "${report_dir}"

      - name: Run curated replay sample
        run: |
          replay_root="${{ runner.temp }}/replay-cohort"
          # shellcheck disable=SC2153 -- REPLAY_ROOT is set in the job-level env block
          cp -a "${REPLAY_ROOT}" "${replay_root}"

          python3 scripts/live_provider_enrich_missing_metadata.py \
            --root "${replay_root}" \
            --sample-size "${REPLAY_SAMPLE_SIZE}" \
            --sample-seed "${REPLAY_SAMPLE_SEED}" \
            --report-dir "${{ steps.prep.outputs.report_dir }}/replay"

      - name: Evaluate replay thresholds
        id: guard
        continue-on-error: true
        run: |
          report_json="${{ steps.prep.outputs.report_dir }}/"
          report_json+="replay/replay-cohort_live_enrichment_report.json"
          if [[ ! -f "${report_json}" ]]; then
            report_json="$(find \
              "${{ steps.prep.outputs.report_dir }}/replay" \
              -maxdepth 2 \
              -name '*_live_enrichment_report.json' \
              | head -n 1)"
          fi

          if [[ -z "${report_json}" || ! -f "${report_json}" ]]; then
            echo "report_status=missing" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          python3 scripts/replay_regression_guard.py \
            --report "${report_json}" \
            --thresholds tests/fixtures/replay-cohort/expected-thresholds.json \
            --summary-out \
            "${{ steps.prep.outputs.report_dir }}/replay-guard-summary.json"

          echo "report_status=checked" >> "$GITHUB_OUTPUT"

      - name: Open or update regression issue
        if: steps.guard.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          REPORT_DIR: ${{ steps.prep.outputs.report_dir }}
        with:
          script: |
            const fs = require('fs');
            const path = [
              process.env.GITHUB_WORKSPACE,
              process.env.REPORT_DIR,
              'replay-guard-summary.json'
            ].join('/');
            let summaryText = 'Replay guard failed before summary generation.';

            if (fs.existsSync(path)) {
              const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
              summaryText = [
                `Status: ${summary.status}`,
                `Discovered Targets: ${summary.discoveredTargets}`,
                `Accepted: ${summary.accepted}`,
                `Unresolved: ${summary.unresolved}`,
                `Unresolved Ratio: ${summary.unresolvedRatio}`,
                `No-candidates: ${summary.noCandidates}`,
                `No-candidates Share: ${summary.noCandidateShare}`,
                '',
                'Failures:',
                ...(summary.failures || []).map(f => `- ${f}`)
              ].join('\n');
            }

            const runUrl = [
              'https://github.com',
              context.repo.owner,
              context.repo.repo,
              'actions/runs',
              String(context.runId)
            ].join('/');
            const title = [
              'Weekly replay regression detected',
              `(${new Date().toISOString().slice(0, 10)})`
            ].join(' ');
            const body = [
              'Automated weekly replay regression guard failed.',
              '',
              summaryText,
              '',
              `Workflow run: ${runUrl}`
            ].join('\n');

            const existingIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
              }
            );

            const existing = existingIssues.find((issue) =>
              !issue.pull_request &&
              issue.title.startsWith('Weekly replay regression detected')
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  'Another weekly replay regression was detected.',
                  '',
                  body
                ].join('\n')
              });

              core.info(
                `Updated existing replay regression issue #${existing.number}`
              );
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });

      - name: Fail when replay thresholds regress
        if: steps.guard.outcome == 'failure'
        run: |
          echo "Replay thresholds regressed. Issue has been opened."
          exit 1

      - name: Upload replay report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: weekly-replay-report-${{ steps.prep.outputs.run_date }}
          path: ${{ steps.prep.outputs.report_dir }}
