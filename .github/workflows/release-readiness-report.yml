name: Release Readiness Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: read
  security-events: read

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Generate release-readiness report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _artifacts/release-readiness
          python3 scripts/release_readiness_report.py \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --branches develop staging main \
            --allow-integration-403 \
            --md-out _artifacts/release-readiness/release-readiness.md \
            --json-out _artifacts/release-readiness/release-readiness.json

          python3 scripts/dependabot_lockfile_triage.py \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --lockfile yarn.lock \
            --allow-integration-403 \
            --md-out _artifacts/release-readiness/dependabot-triage.md \
            --json-out _artifacts/release-readiness/dependabot-triage.json

          python3 scripts/audit_branch_protection.py \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --branches develop staging main \
            --expected-review-count 0 \
            --allow-integration-403 \
            --md-out _artifacts/release-readiness/branch-policy-audit.md \
            --json-out _artifacts/release-readiness/branch-policy-audit.json

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-readiness-report
          path: _artifacts/release-readiness
