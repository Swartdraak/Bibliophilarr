name: Branch Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-long-lived-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure branch refs exist
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetBranches = ['develop', 'staging', 'release', 'hotfix'];

            const defaultRef = await github.rest.git.getRef({
              owner,
              repo,
              ref: 'heads/main'
            });

            const sha = defaultRef.data.object.sha;

            for (const branch of targetBranches) {
              try {
                await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`
                });
                core.info(`Branch exists: ${branch}`);
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.git.createRef({
                    owner,
                    repo,
                    ref: `refs/heads/${branch}`,
                    sha
                  });
                  core.info(`Branch created: ${branch}`);
                } else {
                  throw err;
                }
              }
            }
