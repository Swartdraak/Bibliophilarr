name: Update Branch Version Badge

on:
  push:
    branches:
      - main
      - staging
      - develop
    paths-ignore:
      - '.github/badges/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve branch version
        id: ver
        shell: bash
        run: |
          git fetch --tags --force

          branch="${GITHUB_REF_NAME}"

          if version=$(git describe --tags --exact-match HEAD 2>/dev/null); then
            :
          elif [[ "$branch" == "main" ]]; then
            version=$(git tag --merged HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          else
            version=$(git tag --merged HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$' | sort -V | tail -1)
          fi

          if [[ -z "$version" ]]; then
            version=$(git tag --merged HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          fi

          if [[ -z "$version" ]]; then
            version="$(git rev-parse --short HEAD)"
          fi

          case "$branch" in
            main) color='2ea44f' ;;
            staging) color='f59e0b' ;;
            develop) color='2563eb' ;;
            *) color='6b7280' ;;
          esac

          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "color=${color}" >> "$GITHUB_OUTPUT"

      - name: Commit badge update
        shell: bash
        run: |
          set -euo pipefail

          branch="${{ steps.ver.outputs.branch }}"
          version="${{ steps.ver.outputs.version }}"
          color="${{ steps.ver.outputs.color }}"
          badge_worktree="$RUNNER_TEMP/badge-data"
          badge_file=".github/badges/${branch}-version.json"

          rm -rf "$badge_worktree"
          git fetch origin badge-data:badge-data 2>/dev/null || true

          if git show-ref --verify --quiet refs/heads/badge-data; then
            git worktree add "$badge_worktree" badge-data
          else
            git worktree add --detach "$badge_worktree" HEAD
            (
              cd "$badge_worktree"
              git checkout --orphan badge-data
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          cd "$badge_worktree"
          mkdir -p .github/badges
          cat > "$badge_file" <<EOF
          {
            "schemaVersion": 1,
            "label": "${branch}",
            "message": "${version}",
            "color": "${color}"
          }
          EOF

          if [[ -z "$(git status --porcelain -- "$badge_file")" ]]; then
            echo "Badge already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$badge_file"
          git commit -m "chore(ci): refresh ${branch} version badge"
          git push origin HEAD:badge-data
