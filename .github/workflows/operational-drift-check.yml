name: Operational Drift Check

'on':
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * 2'

permissions:
  contents: read

jobs:
  operational-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Generate operational drift report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _artifacts/operational-drift
          python3 scripts/operational_drift_report.py \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --md-out _artifacts/operational-drift/operational-drift.md \
            --json-out _artifacts/operational-drift/operational-drift.json

      - name: Upload operational drift artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: operational-drift-report
          path: _artifacts/operational-drift